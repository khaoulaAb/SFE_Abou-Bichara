<form  th:action="@{/update}" method="post" data-th-fragment="update">
    <div class="modal fade" id="exampleModalUp" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Update</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">

                    <div class="form-group">
                        <input type="hidden" class="form-control" id="id" name="id" value="" />
                    </div>
                    <div class="form-group">
                        <label for="nom" class="form-control-label">Nom:</label>
                        <input type="text" class="form-control" id="nom" name="nom" value="" />
                    </div>

                    <div class="form-group">
                        <label for="prenom" class="form-control-label">Prenom:</label>
                        <input type="text" class="form-control" id="prenom" name="prenom" value="" />
                    </div>
                    <div class="form-group">
                        <label for="genre" class="form-control-label">genre:</label>
                        <input type="text" class="form-control" id="genre" name="genre" value="" />
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-control-label">Email:</label>
                        <input type="email" class="form-control" id="email" name="email" value="" />
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-control-label">Password:</label>
                        <input type="password" class="form-control" id="password" name="password" value="" />
                    </div>

                    <div class="form-group">
                        <select id="role" name="role" >
                            <option th:each="role: ${roles}"
                                    th:value="${role.id}"
                                    th:text="${role.role}"/>
                        </select>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <input type="submit" class="btn btn-primary" value="save" />
                </div>
            </div>
        </div>
    </div>
</form>
