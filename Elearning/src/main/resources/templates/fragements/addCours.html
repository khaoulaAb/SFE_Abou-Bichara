<form  th:action="@{/cours/save}" method="post"  th:object="${cours}" enctype="multipart/form-data" data-th-fragment="addCours">
    <div class="modal fade" id="exampleModalCours" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="card-header">
                    <h3 class="text-center ">Ajouter un cours</h3>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <input type="hidden" class="form-control" id="id" th:field="*{id}" value=""/>
                    </div>
                    <div class="form-group">
                        <label for="titre">Titre</label>
                        <input type="text" class="form-control" id="titre" placeholder="titre" th:field="*{titre}"  required="">
                    </div>
                    <div class="form-group">
                        <label for="description">Description <em style="font-size: 12px;">(maximum 2000 caractères)</em></label>
                        <textarea class="form-control" rows="7" maxlength="2000" id="description" title="maximum 2000 caractères" placeholder="Description" th:field="*{description}" required=""/>

                    </div>
                    <div class="form-group">
                        <label for="files">Fichiers</label>
                        <input type="file" class="form-control" id="files" placeholder="Upload Files" th:field="*{files}" multiple="multiple" required="">
                    </div>
                    <div class="form-group">
                        <label for="filiere">Filiere</label><br>
                        <select class="form-control" th:field="*{filiere}" id="filiere"  required="">
                            <option th:each="filiere: ${filieres}"
                                    th:value="${filiere.getId()}"
                                    th:text="${filiere.getAbr()}">
                            </option>
                        </select>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Annuler</button>
                    <input type="submit" class="btn btn-primary" value="Ajouter" />
                </div>
            </div>
        </div>
    </div>
</form>
