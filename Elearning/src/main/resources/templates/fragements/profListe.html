<div class="card" data-th-fragment="ProfListe">

    <div class="card-block">

        <table class="table table-hover">
            <thead>
            <tr>
                <th>Nom</th>
                <th>Prenom</th>
                <th>Email</th>
                <th>Role</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each ="user :${data}">
                <td th:text="${user.nom}"></td>
                <td th:text="${user.prenom}"></td>
                <td th:text="${user.email}"></td>
                <td></td>

                <td> <a class="btn btn-primary eBtn" th:href="@{findUser/{id}(id=${user.id})}"><i class="fa fa-edit"></i>
                </a>

                    <a  class="btn btn-danger delBtn" th:href="@{/users/{id}/delete(id=${user.id})}"><i class="fa fa-remove"></i></a></td>
            </tr>
            </tbody>
        </table>
        <hr/>

        <!--  <ul class="nav nav-pills">
              <li class="nav-item"
                  th:each="i : ${#numbers.sequence(0,data.totalPages-1)}">
                  <a th:href="@{/(page=${i})}" th:text="${i}" class="nav-link"
                     th:classappend="${currentPage}==${i}?'active':''"></a>
              </li>
          </ul>-->

    </div>
</div>
