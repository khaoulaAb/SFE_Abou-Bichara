<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">

<head data-th-replace="fragements/head :: head">


</head>


<body>

<div class="wrapper d-flex align-items-stretch">
    <div data-th-replace="fragements/menu-sidebar :: menu-sidebar"></div>

    <div id="content" class="p-4 p-md-5">
        <div data-th-replace="fragements/menu-navbar :: menu-navbar"></div>

        <div class = "container" >
            <h2 class="text-center mb-5" >Liste des Cours </h2>
            <nav class="navbar navbar-expand-lg navbar navbar-light bg-light">
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mr-auto">


                    </ul>
                    <form class="forms-sample" th:action="@{/cours/search}">

                        <div class="input-group">
                            <div class="input-group-prepend bg-info">
                                <span class="input-group-text bg-transparent">
                                   <a th:href="@{/cours}"><i class="fa fa-refresh"></i></a>
                                </span>
                            </div>
                            <input class="form-control mr-sm-2" type="text"  placeholder="Rechercher" aria-label="Username" aria-describedby="colored-addon1"
                                   name="s" id="search">
                            <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Recherche</button>
                        </div>
                    </form>
                </div>
            </nav>
            <br>



            <!--/container-->



            <div class="row">

                <div class="col-sm-6" th:each="cours: ${Listcours}" style="margin-bottom: 5%; " >

                    <div class="card text-dark bg-light">

                        <div class="card-header  text-left text-light"  style="background-color: #ccffb3">
                            <h4 th:text="${cours.getTitre()}"></h4>

                            <span class="date"  ><em style=" display: inline-block; color:olive;" th:text="'publié par :'+ ${cours.getUser().getNom()}+' '+${cours.getUser().getPrenom()}"></em></span><span class="time"> &nbsp  &nbsp</span>
                        </div>

                        <div class="card-body " style="background-color: #ccffb3" >
                            <a class="btn btn-primary btn-sm btnDesc" th:attr="data-id=${cours.getDescription()}"  >Description</a>
                            <br>
                            <em class="float-right" style="  color:olivedrab;" th:text=" ${cours.getCreatedDate()}" >
                            </em>
                            <!---- description modal--->

                            <div class="modal fade" id="myModalDesc" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                                <div class="modal-dialog" role="document">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title text-center" id="exampleModalLabel">Description</h5>
                                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                <span aria-hidden="true">&times;</span>
                                            </button>
                                        </div>
                                        <div class="modal-body">
                                            <p class="alert" id="pp"  >
                                            </p>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-dismiss="modal">Annuler</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>


                        <div class="card-footer  border-warning text-right" style="background-color: #ccffb3" >


                                    <span class="date float-left" >


                                        <em style=" display: inline-block; color:olive"  th:text="'Commentaires ('+${cours.getRemarques().size()}+')'" ></em>

                                    </span>


                            <a  class="btn btn-success"  th:href="@{/cours/coursDetails/{id}(id=${cours.id})}"><i class="fa fa-info"></i></a>


                        </div>

                    </div>

                </div>


            </div>


        </div>
    </div>
</div>


<div data-th-replace="fragements/script :: script"></div>

</body>
</html>
