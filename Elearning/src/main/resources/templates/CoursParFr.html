
<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">

<head data-th-replace="fragements/head :: head">


</head>


<body>

    <div class="wrapper d-flex align-items-stretch">
        <div data-th-replace="fragements/menu-sidebar :: menu-sidebar"></div>

        <div id="content" class="p-4 p-md-5">
            <div data-th-replace="fragements/menu-navbar :: menu-navbar"></div>

            <div class = "container">
                <h2 class="text-center mb-5">Filières</h2>

                <div class="row">
                    <div class="col-sm-3"  th:each="filiere: ${filieres}" style="margin-bottom: 4%; ">
                        <div class="card" style="background-color: #ccffb3">
                            <div class="card-body">
                                <h5 class="card-title" th:title="${filiere.getNom()}" th:text="${filiere.getAbr()}"></h5>
                                <a class="btn btn-sm btn-primary text-black" th:title="${filiere.getNom()}" th:href="@{'/coursParFiliere/'+${filiere.id}+'/cours'}">Cours</a>
                            </div>
                        </div>
                    </div>

                </div>


            </div>
        </div>
    </div>



    </div>








<div data-th-replace="fragements/script :: script"></div>

</body>
</html>
