<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">

<head>
    <title>E-learning</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700,800,900" rel="stylesheet">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/remarque.css">

    <script type="text/javascript" src="/webjars/jquery/jquery.min.js" ></script>
    <script type="text/javascript" src="/webjars/bootstrap/js/bootstrap.min.js" ></script>
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css"/>
    <!--===============================================================================================-->
    <!--===============================================================================================-->
    <!--===============================================================================================-->

    <link rel="stylesheet" href="/css/upCours.css">
    <script type="text/javascript"
            src="https://www.gstatic.com/charts/loader.js"></script>


    <script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
    <script type="text/javascript" src="/js/chart.js" ></script>

    <link rel="stylesheet" href="/css/chat.css" />

</head>
<body>
    <noscript>
        <h2>Sorry! Your browser doesn't support Javascript</h2>
    </noscript>
    <div id="username-page">
        <div class="username-page-container">
            <h1 class="title">Binvenue</h1>
            <form id="usernameForm" name="usernameForm">
                <div class="form-group">
                    <input type="hidden" id="name" placeholder="Username" th:value="${user.getNom()+' '+user.getPrenom()}"
                           autocomplete="off" class="form-control" />
                </div>
                <div class="form-group">
                    <button type="submit" class="accent username-submit">Commencer
                        le chat</button>
                </div>
            </form>
        </div>
    </div>


    <div class="wrapper d-flex align-items-stretch">
        <div data-th-replace="fragements/menu-sidebar :: menu-sidebar"></div>

        <div id="content" class="p-4 p-md-5">
            <div data-th-replace="fragements/menu-navbar :: menu-navbar"></div>


            <div id="chat-page" class = "container hidden" >
                <div class="row">

                    <div class="card col-sm-12 " >

                        <div  class=" overflow-auto" style="height: 500px">
                            <div class="chat-container">
                                <div class="chat-header">
                                    <h2>E-Learning </h2>
                                </div>
                                <div class="connecting">Connecting...</div>
                                <ul id="messageArea">

                                </ul>
                                <form id="messageForm" name="messageForm" nameForm="messageForm">
                                    <div class="form-group">
                                        <div class="input-group clearfix">
                                            <input type="text" id="message" placeholder="Taper un message"
                                                   autocomplete="off" class="form-control" />
                                            <button type="submit" class="primary"><i class="fa fa-arrow-right"></i></button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>

                    </div>


                </div>
            </div>
        </div>
    </div>

    <div data-th-replace="fragements/script :: script"></div>

</body>
</html>
