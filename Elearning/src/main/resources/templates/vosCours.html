<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">

<head data-th-replace="fragements/head :: head">


</head>


<body>

<div class="wrapper d-flex align-items-stretch">
    <div data-th-replace="fragements/menu-sidebar :: menu-sidebar"></div>

    <div id="content" class="p-4 p-md-5">
        <div data-th-replace="fragements/menu-navbar :: menu-navbar"></div>

        <div class = "container">
            <button class="btn btn-success btnAddCours "><i class="fa fa-plus"></i></button>
            <h2 class="text-center mb-5">Votre Cours</h2>
            <nav class="navbar navbar-expand-lg navbar navbar-light bg-light">
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mr-auto">


                    </ul>
                    <form class="forms-sample" th:action="@{/votreCours/search}">

                        <div class="input-group">
                            <div class="input-group-prepend bg-info">
                                <span class="input-group-text bg-transparent">
                                   <a th:href="@{/votreCours}"><i class="fa fa-refresh"></i></a>
                                </span>
                            </div>
                            <input class="form-control mr-sm-2" type="text"  placeholder="Rechercher" aria-label="Username" aria-describedby="colored-addon1"
                                   name="s" id="search">
                            <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Recherche</button>
                        </div>
                    </form>
                </div>
            </nav>
            <br>

            <div class="myForm">
                <div data-th-replace="fragements/addCours :: addCours"></div>
            </div>

            <!--/container-->

            <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${successmessage}">
                <strong th:text="${successmessage}"></strong>
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
<!- -->

            <div class="card">

                <div class="card-block">

                    <table id="tableUsers"  class="table table-hover" >
                        <thead>
                        <tr>
                            <th style="width: 35%">Titre</th>
                            <th style="width: 10%">Description</th>
                            <th style="width: 8%">Filiere</th>
                            <th style="width: 10%;">Commentaires</th>
                            <th style="width: 18%">Date</th>
                            <th ></th>

                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="cours: ${Listcours}">
                            <td th:text="${cours.getTitre()}"></td>
                            <td style=" text-align: center">
                                <a class="btn btn-primary btn-sm btnDesc" th:attr="data-id=${cours.getDescription()}"  ><i class="fa fa-eye"></i></a>

                                <!---- description modal--->

                                <div class="modal fade" id="myModalDesc" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                                    <div class="modal-dialog" role="document">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h5 class="modal-title text-center" id="exampleModalLabel">Description</h5>
                                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                    <span aria-hidden="true">&times;</span>
                                                </button>
                                            </div>
                                            <div class="modal-body">
                                                <p class="alert" id="pp"  >
                                                </p>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Annuler</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>


                            </td>
                            <td th:text="${cours.getFiliere().getAbr()}"></td>
                            <td style=" text-align: center" th:text="${cours.getRemarques().size()}"></td>

                            <td th:text=" ${cours.getCreatedDate()}"></td>


                            <td>
                                <a class="btn btn-success btn-sm"  th:href="@{/cours/coursDetails/{id}(id=${cours.id})}"><i class="fa fa-info"></i></a>

                                <a class="btn btn-primary btn-sm" th:href="@{/cours/editcours/{id}(id=${cours.id})}"><i class="fa fa-edit"></i></a>

                                <a href="#" class="btn btn-danger btn-sm confirm-delete" th:attr="data-id=${cours.id}"><i class="fa fa-remove"></i></a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <hr/>

                </div>
            </div>

            <!--- -->



        </div>
    </div>
</div>

<div class="modal fade" id="myModalCours" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Suppression</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class=iv"modal-body">
                <p class="alert alert-danger">
                    Voulez-vous vraiment supprimer ce cours?
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Annuler</button>
                <a href ="" id="idModalLink" class="btn btn-danger"  >Supprimer</a>
            </div>
        </div>
    </div>
</div>



</div>








<div data-th-replace="fragements/script :: script"></div>

</body>
</html>
