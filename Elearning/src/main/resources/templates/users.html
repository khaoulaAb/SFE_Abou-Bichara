<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">

<head data-th-replace="fragements/head :: head">

</head>


<body ng-app="app" ng-controller="addUserController">

<div class="wrapper d-flex align-items-stretch">
    <div data-th-replace="fragements/menu-sidebar :: menu-sidebar"></div>

    <div id="content" class="p-4 p-md-5">
        <div data-th-replace="fragements/menu-navbar :: menu-navbar"></div>


        <div class = "container">

            <button class="btn btn-success nBtn ">Ajouter</button>
            <br>
            <div class="card">

                <div class="card-block">
                    <table class="table table-hover">
                        <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Prenom</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each ="user :${data}">
                            <td th:text="${user.nom}"></td>
                            <td th:text="${user.prenom}"></td>
                            <td th:text="${user.email}"></td>
                            <td></td>
                            <td> <a th:href="@{findOne/(id=${user.id})}" class="btn btn-primary eBtn">Modifier</a>

                                <a th:href="@{delete/(id=${user.id})}" class="btn btn-danger delBtn">Supprimer</a></td>
                        </tr>
                        </tbody>
                    </table>
                    <hr/>

                  <!--  <ul class="nav nav-pills">
                        <li class="nav-item"
                            th:each="i : ${#numbers.sequence(0,data.totalPages-1)}">
                            <a th:href="@{/(page=${i})}" th:text="${i}" class="nav-link"
                               th:classappend="${currentPage}==${i}?'active':''"></a>
                        </li>
                    </ul>-->

                </div>
            </div>


            <div class="myForm">
                <form  th:action="@{/save}" method="post">
                    <div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                        <div class="modal-dialog" role="document">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="exampleModalLabel">Update or create</h5>
                                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                        <span aria-hidden="true">&times;</span>
                                    </button>
                                </div>
                                <div class="modal-body">

                                    <div class="form-group">
                                        <label for="nom" class="form-control-label">Nom:</label>
                                        <input type="text" class="form-control" id="nom" name="nom" value="" />
                                    </div>

                                    <div class="form-group">
                                        <label for="prenom" class="form-control-label">Prenom:</label>
                                        <input type="text" class="form-control" id="prenom" name="prenom" value="" />
                                    </div>
                                    <div class="form-group">
                                        <label for="genre" class="form-control-label">genre:</label>
                                        <input type="text" class="form-control" id="genre" name="genre" value="" />
                                    </div>
                                    <div class="form-group">
                                        <label for="email" class="form-control-label">Email:</label>
                                        <input type="email" class="form-control" id="email" name="email" value="" />
                                    </div>
                                    <div class="form-group">
                                        <label for="password" class="form-control-label">Password:</label>
                                        <input type="password" class="form-control" id="password" name="password" value="" />
                                    </div>

                                    <div class="form-group">
                                        <select name="role" id="role">
                                            <option th:each="role: ${roles}"
                                                    th:value="${role.id}"
                                                    th:text="${role.role}"/>
                                        </select>
                                    </div>

                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                                    <input type="submit" class="btn btn-primary" value="save" />
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog" role="document">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="exampleModalLabel">Modal title</h5>
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        <div class="modal-body">
                            <p class="alert alert-danger">
                                Are you sure you want to delete this country?
                            </p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                            <a href =""  class="btn btn-danger"  id="delRef">Delete</a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
        </div>
</div>

<div data-th-replace="fragements/script :: script"></div>


</body>
</html>
