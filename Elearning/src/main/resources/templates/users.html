<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">

<head data-th-replace="fragements/head :: head">

</head>


<body ng-app="app" ng-controller="addUserController">

<div class="wrapper d-flex align-items-stretch">
    <div data-th-replace="fragements/menu-sidebar :: menu-sidebar"></div>

    <div id="content" class="p-4 p-md-5">
        <div data-th-replace="fragements/menu-navbar :: menu-navbar"></div>

        <div class="row">
        <div class="col">

        </div>
    </div>

        <div class = "container">

            <button class="btn btn-success newBtn "><i class="fas fa-plus-circle"></i>Ajouter</button>

            <div class="card">
                <br>
                <br>
                <div class="card-block">

                    <table class="table table-hover">
                        <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Prenom</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each ="user :${data}">
                            <td th:text="${user.nom}"></td>
                            <td th:text="${user.prenom}"></td>
                            <td th:text="${user.email}"></td>
                            <td></td>
                            <td> <a class="btn btn-primary eBtn" th:href="@{findUser/{id}(id=${user.id})}"><i class="fas fa-pencil-alt"></i> Modifier</a>

                                <a  class="btn btn-danger delBtn" th:href="@{/users/{id}/delete(id=${user.id})}"><i class="fas fa-trash-alt"></i>Supprimer</a></td>
                        </tr>
                        </tbody>
                    </table>
                    <hr/>

                  <!--  <ul class="nav nav-pills">
                        <li class="nav-item"
                            th:each="i : ${#numbers.sequence(0,data.totalPages-1)}">
                            <a th:href="@{/(page=${i})}" th:text="${i}" class="nav-link"
                               th:classappend="${currentPage}==${i}?'active':''"></a>
                        </li>
                    </ul>-->

                </div>
            </div>


            <div class="myForm">
                <div data-th-replace="fragements/ajouter :: ajouter"></div>
                <div data-th-replace="fragements/update :: update"></div>


            </div>

            <div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog" role="document">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="exampleModalLabel">Modal title</h5>
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        <div class="modal-body">
                            <p class="alert alert-danger">
                                Voulez-vous vraiment supprimer cet utilisateur?
                            </p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                            <a href =""  class="btn btn-danger"  id="delRef">Delete</a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
        </div>
</div>

<div data-th-replace="fragements/script :: script"></div>


</body>
</html>
