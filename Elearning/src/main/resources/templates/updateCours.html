<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">

<head data-th-replace="fragements/head :: head">


    <style>

    </style>
</head>


<body>

<div class="wrapper d-flex align-items-stretch">
    <div data-th-replace="fragements/menu-sidebar :: menu-sidebar"></div>

    <div id="content" class="p-4 p-md-5">
        <div data-th-replace="fragements/menu-navbar :: menu-navbar"></div>



        <!--- -->
        <div class="container">

                    <div class="row">
                        <div class="col-md-9 offset-md-1 ">
                            <!-- form card register -->
                            <div class="card bg-light text-dark ">
                                <div class="card-header border border-left-0 border-right-0 border-top-0 border-warning">
                                    <h3 class="text-center ">Modifier</h3>
                                </div>
                                <div class="card-body">

                                    <form th:action="@{/cours/update}" th:object="${cours}" method="post" enctype="multipart/form-data" class="form" role="form" autocomplete="off">
                                        <div class="form-group">
                                            <label for="inputName">Titre</label>
                                            <input type="text" class="form-control" id="inputName" placeholder="titre" th:field="*{titre}"  required="">
                                        </div>
                                        <div class="form-group">
                                            <label for="inputEmail3">Description</label>
                                            <textarea class="form-control" rows="5" maxlength="2000"  id="inputEmail3" placeholder="Description" th:field="*{description}" required=""/>

                                        </div>
                                        <div class="form-group">
                                            <label for="files">Fichiers</label>
                                            <input type="file" class="form-control" id="files" placeholder="Upload Files" th:field="*{files}" multiple="multiple">
                                        </div>
                                        <br>
                                 <div>
                                         <span th:each="file,itrstat : ${coursfiles}" class="imagecontainer" th:id="'imageindex'+${itrstat.index}">
                                              <video th:title="${file.modifiedFileName}" style="width:80px; height: 50px; " class="image"  th:if="${file.fileExtension=='mp4'}" >
                                                    <source th:src="@{'/files/'+${file.modifiedFileName}}"  type="video/mp4">
                                                </video>
                                               <img th:src="@{'/files/'+${file.modifiedFileName}}"  th:title="${file.modifiedFileName}" style="width:80px; height: 80px; border-radius: 10px;" class="image" th:if="${file.fileExtension=='jpeg' or file.fileExtension=='png'or file.fileExtension=='jpg' or file.fileExtension=='tiff' or file.fileExtension=='gif' }"/>
                                                <img th:src="@{'/images/file.jpg'}"  th:title="${file.modifiedFileName}" th:alt="${file.modifiedFileName}" style="width:80px; height: 80px; border-radius: 10px;" class="image" th:if="${file.fileExtension!='jpeg' and file.fileExtension!='mp4' and file.fileExtension!='png'and file.fileExtension!='jpg' and file.fileExtension!='tiff' and file.fileExtension!='gif' }"/>

                                                <span class="overlay">
                                                    <a href="#" class="icon image-confirm-delete"  th:attr="data-id=${itrstat.index},data-name=${file.modifiedFileName}">
                                                        <i class="fa fa-trash" style="color: red"></i>
                                                    </a>
                                                </span>
                                            </span>
                                </div>
                                        <br>
                                <input type="hidden" class="form-control" th:field="*{removeImages}" id="removeImages">
                                <input type="hidden" class="form-control" th:field="*{id}">
                                        <div class="form-group">
                                            <label for="filiere">Filiere</label><br>
                                            <select class="form-control" th:field="*{filiere}" id="filiere"  required="">
                                                <option th:each="filiere: ${filieres}"
                                                        th:value="${filiere.getId()}"
                                                        th:text="${filiere.getAbr()}"/>
                                            </select>
                                        </div>

                                        <div class="form-group">

                                            <a class="btn btn-secondary float-left" th:href="@{/votreCours}"> annuler</a>
                                            <button type="submit" class="btn btn-primary btn-lg float-right" >Enregistrer</button>

                                        </div>
                                    </form>
                                </div>
                            </div>


                            <!-- /form card register -->
                        </div>
                    </div>
                    <!--/row-->
                <!--/col-->
            <!--/row-->
            <hr>


        </div>


    </div>
</div>

<div data-th-replace="fragements/script :: script"></div>




</body>
</html>
