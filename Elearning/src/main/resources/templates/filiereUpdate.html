<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">

<head data-th-replace="fragements/head :: head">


    <style>

    </style>
</head>


<body>

<div class="wrapper d-flex align-items-stretch">
    <div data-th-replace="fragements/menu-sidebar :: menu-sidebar"></div>

    <div id="content" class="p-4 p-md-5">
        <div data-th-replace="fragements/menu-navbar :: menu-navbar"></div>



        <!--- -->
        <div class="container">

            <div class="row">
                <div class="col-md-9 offset-md-1 ">
                    <!-- form card register -->
                    <div class="card bg-light text-dark ">
                        <div class="card-header border border-left-0 border-right-0 border-top-0 border-warning">
                            <h3 class="text-center ">Modifier</h3>
                        </div>
                        <div class="card-body">

                            <form th:action="@{/filieres/update/{id}(id=${filiere.id})}" th:object="${filiere}" method="post" enctype="multipart/form-data" class="form" role="form" autocomplete="off">
                                <div class="form-group">
                                    <label for="abr">Abriviation</label>
                                    <input type="text" class="form-control" id="abr" placeholder="Abriviation" th:field="*{abr}"  required="">
                                </div>
                                <div class="form-group">
                                    <label for="nom">Nom</label>
                                    <input type="text" class="form-control" id="nom" placeholder="Nom" th:field="*{nom}"  required="">
                                </div>


                                <div class="form-group">

                                    <a class="btn btn-secondary float-left" th:href="@{/filieres}"> annuler</a>
                                    <button type="submit" class="btn btn-primary btn-lg float-right" >Enregistrer</button>

                                </div>
                            </form>
                        </div>
                    </div>


                    <!-- /form card register -->
                </div>
            </div>
            <!--/row-->
            <!--/col-->
            <!--/row-->
            <hr>


        </div>


    </div>
</div>

<div data-th-replace="fragements/script :: script"></div>




</body>
</html>
